name: Deploy Frontend

on:
  push:
    branches: [deploy]
    paths:
      - 'front_despacho/**'
      - 'nginx/**'
      - 'docker-compose.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/frontend-despacho

jobs:
  build-and-push:
    name: Build & Push imagen Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          dockerfile: ./front_despacho/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_DESPACHOS=${{ secrets.VITE_API_DESPACHOS }}
            VITE_API_VENTAS=${{ secrets.VITE_API_VENTAS }}

  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/Devops-Ev2
            docker compose pull frontend
            docker compose up -d --no-deps frontend nginx-proxy
            docker image prune -f